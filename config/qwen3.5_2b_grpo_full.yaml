
model: /workspace/sft_models/id123455/checkpoint-3006-fixed
torch_dtype: bfloat16
attn_impl: flash_attn

rlhf_type: grpo
num_generations: 8
temperature: 1.0

use_vllm: true
vllm_mode: colocate
vllm_gpu_memory_utilization: 0.4
vllm_tensor_parallel_size: 1
vllm_max_model_len: 8192
# sleep_level 1/2 与 vLLM v1 的 mm_receiver_cache 冲突，关闭以保持常驻
sleep_level: 0

tuner_type: full
freeze_vit: true
freeze_aligner: true
vit_gradient_checkpointing: false

dataset:
  - /workspace/data/train/train_grpo.json
load_from_cache_file: true
dataset_num_proc: 48
max_length: 8192
max_pixels: 408000
max_completion_length: 512

external_plugins:
  - /workspace/reward_function/gsm8k_plugin.py
reward_funcs:
  - aigc_accuracy
  - format

enable_thinking: false

num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
gradient_checkpointing: true
learning_rate: 1.0e-6
lr_scheduler_type: cosine
warmup_ratio: 0.03
optim: adamw_torch
adam_beta2: 0.95
max_grad_norm: 1.0
bf16: true

deepspeed: zero3

output_dir: /workspace/output/checkpoint
logging_dir: /summary_dir
logging_steps: 5
save_steps: 200
save_total_limit: 3
save_only_model: true
report_to: tensorboard
dataloader_num_workers: 4
